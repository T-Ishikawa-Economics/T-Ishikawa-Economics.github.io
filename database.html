<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データベース - 経済・産業ダッシュボード</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #f4f7f6; color: #333; }
        .sidebar { width: 250px; background-color: #2c3e50; color: #fff; padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; text-align: center; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .sidebar a { display: block; color: #ecf0f1; text-decoration: none; padding: 12px 15px; margin-bottom: 10px; border-radius: 4px; }
        .sidebar a:hover { background-color: #34495e; }
        .sidebar a.active { background-color: #3498db; font-weight: bold; }
        .main-content { margin-left: 250px; padding: 40px; }
        
        .dashboard-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { border-bottom: 2px solid #2c3e50; padding-bottom: 10px; color: #2c3e50; }
        h2 { font-size: 1.2rem; color: #34495e; margin-bottom: 15px; border-left: 4px solid #3498db; padding-left: 10px; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .chart-container { width: 100%; height: 400px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <a href="index.html">Home</a>
        <a href="database.html" class="active">データベース</a>
        <a href="materials.html">授業資料</a>
        <a href="cv.html">CV</a>
    </div>

    <div class="main-content">
        <h1>産業・経済データ ダッシュボード</h1>
        <p>各グラフのドロップダウンメニューから変数を選択すると、インタラクティブにグラフが更新されます。</p>

        <div class="dashboard-card">
            <h2>1. 生産に関するデータ (1980-2022)</h2>
            <div class="controls">
                <label>変数1: <select id="prod-var1"></select></label>
                <label>変数2: <select id="prod-var2"></select></label>
            </div>
            <div id="chart-production" class="chart-container"></div>
        </div>

        <div class="dashboard-card">
            <h2>2. 1時間当たりの報酬と付加価値 (1980-2022)</h2>
            <div class="controls">
                <span>※「名目雇用者報酬／総労働時間」と「名目付加価値額／総労働時間」の比較</span>
            </div>
            <div id="chart-labor" class="chart-container"></div>
        </div>

        <div class="dashboard-card">
            <h2>3. 供給先の構成比率</h2>
            <div class="controls">
                <label>表示年: <select id="supply-year"></select></label>
            </div>
            <div id="chart-supply" class="chart-container"></div>
        </div>

        <div class="dashboard-card">
            <h2>4. 投資・資本ストック (1980-2022)</h2>
            <div class="controls">
                <label>変数1: <select id="cap-var1"></select></label>
                <label>変数2: <select id="cap-var2"></select></label>
                <label>変数3: <select id="cap-var3"><option value="none">-- 選択しない --</option></select></label>
                <label>変数4: <select id="cap-var4"><option value="none">-- 選択しない --</option></select></label>
            </div>
            <div id="chart-capital" class="chart-container"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // データの準備（※本番環境ではここでCSVを読み込みます）
        // ==========================================
        const years = Array.from({length: 43}, (_, i) => 1980 + i);
        const supplyYears = Array.from({length: 27}, (_, i) => 1994 + i);

        // 1. 生産データ（ダミー）
        const prodVars = ["名目産出額", "実質産出額", "名目付加価値額", "実質付加価値額", "名目中間投入額", "実質中間投入額"];
        const prodData = {};
        prodVars.forEach(v => {
            prodData[v] = years.map((y, i) => 1000 + i * 50 + Math.random() * 200); // 上昇トレンドのダミー
        });

        // 2. 労働データ（ダミー）
        const laborData = {
            "名目雇用者報酬": years.map((y, i) => 500 + i * 20 + Math.random() * 50),
            "総労働時間": years.map((y, i) => 10000 - i * 50 + Math.random() * 100) // 減少トレンド
        };

        // 3. 供給先データ（ダミー）
        const supplyCategories = ["病院", "診療所", "卸売り", "小売り", "賃貸業者", "その他"];
        const supplyData = {};
        supplyYears.forEach(y => {
            supplyData[y] = supplyCategories.map(() => Math.random() * 100);
        });

        // 4. 資本データ（ダミー）
        const capCategories = ["建物", "構築物", "情報通信機械", "その他機械", "ソフトウェア", "研究開発"];
        const capMetrics = ["名目", "実質", "資本ストック", "資本サービス"];
        const capVars = [];
        capCategories.forEach(c => capMetrics.forEach(m => capVars.push(`${c}_${m}`)));
        const capData = {};
        capVars.forEach(v => {
            capData[v] = years.map((y, i) => 100 + i * 10 + Math.random() * 50);
        });

        // ==========================================
        // UIの初期化とグラフ描画処理
        // ==========================================
        
        // --- 1. 生産に関するデータ ---
        const selProd1 = document.getElementById('prod-var1');
        const selProd2 = document.getElementById('prod-var2');
        prodVars.forEach(v => {
            selProd1.add(new Option(v, v));
            selProd2.add(new Option(v, v));
        });
        selProd2.selectedIndex = 1; // 初期値ずらす

        function updateProdChart() {
            const v1 = selProd1.value;
            const v2 = selProd2.value;
            const trace1 = { x: years, y: prodData[v1], type: 'scatter', mode: 'lines+markers', name: v1 };
            const trace2 = { x: years, y: prodData[v2], type: 'scatter', mode: 'lines+markers', name: v2 };
            Plotly.newPlot('chart-production', [trace1, trace2], { margin: { t: 20 }, legend: { orientation: 'h', y: -0.2 } });
        }
        selProd1.addEventListener('change', updateProdChart);
        selProd2.addEventListener('change', updateProdChart);
        updateProdChart();

        // --- 2. 労働と生産性 ---
        // (名目雇用者報酬 / 総労働時間) と (名目付加価値額 / 総労働時間) を計算
        const wagePerHour = years.map((y, i) => laborData["名目雇用者報酬"][i] / laborData["総労働時間"][i]);
        const vaPerHour = years.map((y, i) => prodData["名目付加価値額"][i] / laborData["総労働時間"][i]);
        
        const traceLabor1 = { x: years, y: wagePerHour, type: 'scatter', mode: 'lines', name: '1時間当たり名目雇用者報酬' };
        const traceLabor2 = { x: years, y: vaPerHour, type: 'scatter', mode: 'lines', name: '1時間当たり名目付加価値額' };
        Plotly.newPlot('chart-labor', [traceLabor1, traceLabor2], { margin: { t: 20 }, legend: { orientation: 'h', y: -0.2 } });

        // --- 3. 供給先の構成 ---
        const selSupply = document.getElementById('supply-year');
        supplyYears.forEach(y => selSupply.add(new Option(y + "年", y)));
        
        function updateSupplyChart() {
            const year = parseInt(selSupply.value);
            const trace = [{
                values: supplyData[year],
                labels: supplyCategories,
                type: 'pie',
                hole: 0.4 // ドーナツチャートにする場合
            }];
            Plotly.newPlot('chart-supply', trace, { margin: { t: 20 } });
        }
        selSupply.addEventListener('change', updateSupplyChart);
        updateSupplyChart();

        // --- 4. 投資・資本に関するデータ ---
        const selCap1 = document.getElementById('cap-var1');
        const selCap2 = document.getElementById('cap-var2');
        const selCap3 = document.getElementById('cap-var3');
        const selCap4 = document.getElementById('cap-var4');
        
        capVars.forEach(v => {
            selCap1.add(new Option(v, v));
            selCap2.add(new Option(v, v));
            selCap3.add(new Option(v, v));
            selCap4.add(new Option(v, v));
        });
        selCap2.selectedIndex = 1;

        function updateCapChart() {
            const selected = [selCap1.value, selCap2.value, selCap3.value, selCap4.value].filter(v => v !== "none");
            const traces = selected.map(v => ({
                x: years, y: capData[v], type: 'scatter', mode: 'lines', name: v
            }));
            Plotly.newPlot('chart-capital', traces, { margin: { t: 20 }, legend: { orientation: 'h', y: -0.2 } });
        }
        [selCap1, selCap2, selCap3, selCap4].forEach(sel => sel.addEventListener('change', updateCapChart));
        updateCapChart();

    </script>
</body>
</html>
