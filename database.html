<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データベース - 経済・産業ダッシュボード</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #f4f7f6; color: #333; }
        .sidebar { width: 250px; background-color: #2c3e50; color: #fff; padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; text-align: center; border-bottom: 1px solid #34495e; padding-bottom: 15px; }
        .sidebar a { display: block; color: #ecf0f1; text-decoration: none; padding: 12px 15px; margin-bottom: 10px; border-radius: 4px; }
        .sidebar a:hover { background-color: #34495e; }
        .sidebar a.active { background-color: #3498db; font-weight: bold; }
        .main-content { margin-left: 250px; padding: 40px; }
        
        .dashboard-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { border-bottom: 2px solid #2c3e50; padding-bottom: 10px; color: #2c3e50; }
        h2 { font-size: 1.2rem; color: #34495e; margin-bottom: 15px; border-left: 4px solid #3498db; padding-left: 10px; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .chart-container { width: 100%; height: 400px; }
        #loading { display: none; color: #e74c3c; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <a href="index.html">Home</a>
        <a href="database.html" class="active">データベース</a>
        <a href="materials.html">授業資料</a>
        <a href="cv.html">CV</a>
    </div>

    <div class="main-content">
        <h1>産業・経済データ ダッシュボード</h1>
        <div id="loading">データを読み込んでいます...</div>
        <p>各グラフのドロップダウンメニューから変数を選択すると、インタラクティブにグラフが更新されます。</p>

        <div class="dashboard-card">
            <h2>1. 生産に関するデータ (単位: 百万円)</h2>
            <div class="controls">
                <label>変数1: <select id="prod-var1"></select></label>
                <label>変数2: <select id="prod-var2"></select></label>
            </div>
            <div id="chart-production" class="chart-container"></div>
        </div>

        <div class="dashboard-card">
            <h2>2. 1時間当たりの報酬と付加価値 (単位: 百万円/時間)</h2>
            <div class="controls">
                <span>※「名目雇用者報酬／総労働時間」と「名目付加価値額／総労働時間」の比較</span>
            </div>
            <div id="chart-labor" class="chart-container"></div>
        </div>

        <div class="dashboard-card">
            <h2>3. 供給先の構成比率 (単位: 百万円)</h2>
            <div class="controls">
                <label>表示年: <select id="supply-year"></select></label>
            </div>
            <div id="chart-supply" class="chart-container"></div>
        </div>

        <div class="dashboard-card">
            <h2>4. 投資・資本データ (単位: 百万円)</h2>
            <div class="controls">
                <label>変数1: <select id="cap-var1"></select></label>
                <label>変数2: <select id="cap-var2"></select></label>
                <label>変数3: <select id="cap-var3"><option value="none">-- 選択しない --</option></select></label>
                <label>変数4: <select id="cap-var4"><option value="none">-- 選択しない --</option></select></label>
            </div>
            <div id="chart-capital" class="chart-container"></div>
        </div>
    </div>

    <script>
        const dataCsvUrl = 'data.csv'; 
        const supplyCsvUrl = 'supply.csv';
        
        let globalData = []; 
        let supplyData = [];
        let years = [];
        let supplyYears = [];

        const selProd1 = document.getElementById('prod-var1');
        const selProd2 = document.getElementById('prod-var2');
        const selSupply = document.getElementById('supply-year');
        const capSels = [document.getElementById('cap-var1'), document.getElementById('cap-var2'), document.getElementById('cap-var3'), document.getElementById('cap-var4')];
        const loadingDiv = document.getElementById('loading');

        loadingDiv.style.display = 'block';

        // 1. まず data.csv を読み込む
        Papa.parse(dataCsvUrl, {
            download: true,
            header: true,
            dynamicTyping: true, 
            skipEmptyLines: true,
            complete: function(dataResults) {
                globalData = dataResults.data;
                
                // 2. 次に supply.csv を読み込む
                Papa.parse(supplyCsvUrl, {
                    download: true,
                    header: true,
                    dynamicTyping: true, 
                    skipEmptyLines: true,
                    complete: function(supplyResults) {
                        supplyData = supplyResults.data;
                        loadingDiv.style.display = 'none';
                        
                        if(globalData.length === 0 || supplyData.length === 0) {
                            alert("データの読み込みに失敗しました。");
                            return;
                        }

                        // --- 【修正】見えない文字（BOM）対策 ---
                        // 名前で探さず、無条件で「1列目」を「年」として取得します
                        const yearKeyData = Object.keys(globalData[0])[0]; 
                        const yearKeySupply = Object.keys(supplyData[0])[0];

                        years = globalData.map(row => row[yearKeyData]);
                        supplyYears = supplyData.map(row => row[yearKeySupply]);
                        
                        // 1列目以外のすべての列名をヘッダーとして取得
                        const headers = Object.keys(globalData[0]).filter(h => h !== yearKeyData);

                        const prodVars = headers.filter(h => h.includes('産出額') || h.includes('付加価値') || h.includes('中間投入'));
                        const supplyCategories = ["病院", "診療所", "卸売業者", "小売業者", "賃貸業者", "その他"]; 
                        const capVars = headers.filter(h => h.includes('建物') || h.includes('構築物') || h.includes('機械') || h.includes('ソフトウェア') || h.includes('研究開発'));

                        // --- 1. 生産データのグラフ描画 ---
                        prodVars.forEach(v => {
                            selProd1.add(new Option(v, v));
                            selProd2.add(new Option(v, v));
                        });
                        if(prodVars.length > 1) selProd2.selectedIndex = 1;

                        function updateProdChart() {
                            const v1 = selProd1.value;
                            const v2 = selProd2.value;
                            const trace1 = { x: years, y: globalData.map(r => r[v1]), type: 'scatter', mode: 'lines+markers', name: v1 };
                            const trace2 = { x: years, y: globalData.map(r => r[v2]), type: 'scatter', mode: 'lines+markers', name: v2 };
                            Plotly.newPlot('chart-production', [trace1, trace2], { 
                                margin: { t: 20 }, 
                                legend: { orientation: 'h', y: -0.2 },
                                yaxis: { title: '金額 (百万円)' } 
                            });
                        }
                        selProd1.addEventListener('change', updateProdChart);
                        selProd2.addEventListener('change', updateProdChart);
                        if(prodVars.length > 0) updateProdChart();

                        // --- 2. 労働データのグラフ描画 ---
                        const wageCol = headers.find(h => h.includes('名目雇用者報酬'));
                        const hoursCol = headers.find(h => h.includes('総労働時間'));
                        const vaCol = headers.find(h => h.includes('名目付加価値額'));

                        if(wageCol && hoursCol && vaCol) {
                            const wagePerHour = globalData.map(r => r[wageCol] / r[hoursCol]);
                            const vaPerHour = globalData.map(r => r[vaCol] / r[hoursCol]);
                            const traceLabor1 = { x: years, y: wagePerHour, type: 'scatter', mode: 'lines', name: '1時間当たり名目雇用者報酬' };
                            const traceLabor2 = { x: years, y: vaPerHour, type: 'scatter', mode: 'lines', name: '1時間当たり名目付加価値額' };
                            Plotly.newPlot('chart-labor', [traceLabor1, traceLabor2], { 
                                margin: { t: 20 }, 
                                legend: { orientation: 'h', y: -0.2 },
                                yaxis: { title: '金額 (百万円 / 時間)' }
                            });
                        }

                        // --- 3. 供給先データのグラフ描画 ---
                        supplyYears.forEach((y, index) => {
                            // 空データを除外してプルダウンに追加
                            if (y !== null && y !== undefined && y !== "") {
                                selSupply.add(new Option(y + "年", index)); 
                            }
                        });

                        function updateSupplyChart() {
                            const rowIndex = parseInt(selSupply.value);
                            const rowData = supplyData[rowIndex]; 
                            const values = supplyCategories.map(cat => rowData[cat] || 0); 

                            const trace = [{
                                values: values,
                                labels: supplyCategories,
                                type: 'pie',
                                hole: 0.4,
                                hovertemplate: '%{label}: %{value:,.0f} 百万円<br>%{percent}<extra></extra>' 
                            }];
                            Plotly.newPlot('chart-supply', trace, { margin: { t: 20 } });
                        }
                        
                        if(selSupply.options.length > 0) {
                            selSupply.addEventListener('change', updateSupplyChart);
                            updateSupplyChart();
                        } else {
                            document.getElementById('chart-supply').innerHTML = "<p style='color:red;'>年号データが見つからないため表示できません。</p>";
                        }

                        // --- 4. 資本データのグラフ描画 ---
                        capVars.forEach(v => {
                            capSels.forEach(sel => sel.add(new Option(v, v)));
                        });
                        if(capVars.length > 1) capSels[1].selectedIndex = 1;

                        function updateCapChart() {
                            const selected = capSels.map(sel => sel.value).filter(v => v !== "none");
                            const traces = selected.map(v => ({
                                x: years, y: globalData.map(r => r[v]), type: 'scatter', mode: 'lines', name: v
                            }));
                            Plotly.newPlot('chart-capital', traces, { 
                                margin: { t: 20 }, 
                                legend: { orientation: 'h', y: -0.2 },
                                yaxis: { title: '金額 (百万円)' } 
                            });
                        }
                        capSels.forEach(sel => sel.addEventListener('change', updateCapChart));
                        if(capVars.length > 0) updateCapChart();
                    }
                });
            }
        });
    </script>
</body>
</html>
